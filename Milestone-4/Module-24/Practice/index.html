<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Document</title>

          <!-- tailwind + daisy -->
           <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
          <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

          <!--Google-font -->
           <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
         
          <!-- font-awesome -CDN -->
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
          <style>
                    *{
                     font-family: "Outfit", sans-serif;
                    }
          </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
<header>
          <div class="logo w-[200px] mx-auto pt-32">
                    <img src="./assets/Logo-full.png" alt="">
          </div>

          <div class="form pt-10">
                    <div class="card bg-base-100 w-full mx-auto max-w-sm rounded-2xl shadow">
                              <div class="card-body">
                                       
                                        <fieldset class="fieldset space-y-2">
                                        <label class="label font-bold text-neutral">Mobile Number</label>
                                        <input id="login-number" type="text" minlength="11" maxlength="11" class="input rounded-full bg-base-200" placeholder="Enter Your 11 Mobile number"  />

                                        <label class="label font-bold text-neutral">4 Digit Pin</label>
                                        <input id="btn-password" type="password" maxlength="4" class="input rounded-full bg-base-200" placeholder = "Enter 4 Digit Pin" />

                                        <button id="btn-login" class="btn btn-neutral mt-4 bg-primary rounded-full">Login</button>
                                        </fieldset>
                              </div>
                    </div>  

          </div>
</header> 

<script src="./script/login-script.js"></script>
</body>
</html>
