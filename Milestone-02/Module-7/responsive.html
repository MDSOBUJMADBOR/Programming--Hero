<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Responsive Website</title>
          <style>
body{
border: 2px solid skyblue;
max-width: 1140px;
margin: 0 auto;
}
.image-container div{
width: 50%;
}
.image-container{
display: flex;
}
.image-container img{
width: 100%;
}
@media screen and (max-width:576px) {
.image-container{
flex-direction: column;

}
.image-container div{
width: 100%;
}     
}
          </style>
</head>
<body>
 <header>
          <h1>Responsive website</h1>
<ol>
          <li>Viewport meta tag </li>
          <li>Css Relative Unit </li>
          <li>body max width and horizontal center align </li>
          <li>image fluid     </li>
          <li>two column flex and use media query with flex direction column    </li>
          <li>multi column : grid layout</li>
          <li>menu Responsive : will need j  avascript</li>
</ol>
 </header>
<main>
<div class="image-container">
          <div><img src="images/food.png" alt=""></div>
          <div><img src="images/tiger.png" alt=""></div>
</div>


</main>



</body>
</html>
